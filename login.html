<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="تسجيل الدخول إلى منصة مدار" />
  <title>تسجيل الدخول | مدار</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-page">
    <a class="back-home" href="index.html" aria-label="العودة إلى الصفحة الرئيسية">
      <span aria-hidden="true">→</span>
      العودة للرئيسية
    </a>

    <div class="symbol sigma sigma-one" aria-hidden="true">Σ</div>
    <div class="symbol sigma sigma-two" aria-hidden="true">Σ</div>
    <div class="symbol integral" aria-hidden="true">∫</div>

    <svg class="geo-shape geo-cube" viewBox="0 0 210 230" aria-hidden="true">
      <g class="geo-lines">
        <path d="M42 58 120 23l58 45-76 42Z"/>
        <path d="M42 58v104l62 43 74-42V68"/>
        <path d="M102 110v95M42 162l60-52 76 53"/>
      </g>
      <g class="geo-nodes">
        <circle cx="42" cy="58" r="5"/><circle cx="120" cy="23" r="4"/>
        <circle cx="178" cy="68" r="5"/><circle cx="102" cy="110" r="5"/>
        <circle cx="42" cy="162" r="4"/><circle cx="104" cy="205" r="5"/>
        <circle cx="178" cy="163" r="5"/>
      </g>
    </svg>

    <svg class="geo-shape geo-tetra" viewBox="0 0 210 190" aria-hidden="true">
      <g class="geo-lines">
        <path d="M24 87 155 22l31 138L24 87Z"/>
        <path d="m24 87 82 42 49-107M106 129l80 31"/>
      </g>
      <g class="geo-nodes">
        <circle cx="24" cy="87" r="5"/><circle cx="155" cy="22" r="4"/>
        <circle cx="106" cy="129" r="5"/><circle cx="186" cy="160" r="5"/>
      </g>
    </svg>

    <svg class="geo-shape geo-globe" viewBox="0 0 220 220" aria-hidden="true">
      <g class="geo-lines">
        <circle cx="110" cy="110" r="88"/>
        <ellipse cx="110" cy="110" rx="46" ry="88"/>
        <ellipse cx="110" cy="110" rx="76" ry="88"/>
        <ellipse cx="110" cy="110" rx="88" ry="38"/>
        <ellipse cx="110" cy="110" rx="88" ry="68"/>
        <path d="M22 110h176M110 22v176"/>
      </g>
      <g class="geo-nodes">
        <circle cx="110" cy="22" r="5"/><circle cx="22" cy="110" r="4"/>
        <circle cx="198" cy="110" r="5"/><circle cx="110" cy="198" r="5"/>
        <circle cx="45" cy="50" r="4"/><circle cx="176" cy="55" r="4"/>
        <circle cx="48" cy="170" r="4"/><circle cx="174" cy="170" r="4"/>
      </g>
    </svg>

    <svg class="geo-shape geo-pyramid" viewBox="0 0 220 240" aria-hidden="true">
      <g class="geo-lines">
        <path d="M110 20 30 180l86 38 78-51-84-147Z"/>
        <path d="M30 180 112 142l82 25M112 142l4 76M110 20l2 122"/>
      </g>
      <g class="geo-nodes">
        <circle cx="110" cy="20" r="5"/><circle cx="30" cy="180" r="5"/>
        <circle cx="112" cy="142" r="4"/><circle cx="116" cy="218" r="5"/>
        <circle cx="194" cy="167" r="5"/>
      </g>
    </svg>

    <section class="login-card" aria-labelledby="roleTitle">
      <div class="card-shine" aria-hidden="true"></div>
      <h1 id="roleTitle">دخول الطالبة</h1>

      <form id="loginForm" novalidate>
        <label class="field">
          <span class="sr-only">اسم المستخدم</span>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder="اسم المستخدم"
            required
          />
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4.8 21a7.2 7.2 0 0 1 14.4 0"></path>
          </svg>
        </label>

        <label class="field password-field">
          <span class="sr-only">كلمة المرور</span>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="كلمة المرور"
            required
          />
          <svg class="key-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="8" cy="15" r="3.2"></circle>
            <path d="m10.5 12.6 7-7 2 2-1.5 1.5 1.3 1.3-2 2-1.3-1.3-3.3 3.3"></path>
          </svg>
          <button class="password-toggle" id="passwordToggle" type="button" aria-label="إظهار كلمة المرور">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.5 12s3.5-5 9.5-5 9.5 5 9.5 5-3.5 5-9.5 5-9.5-5-9.5-5Z"></path>
              <circle cx="12" cy="12" r="2.5"></circle>
            </svg>
          </button>
        </label>

        <p class="form-message" id="formMessage" aria-live="polite"></p>
        <button class="submit-button" type="submit">تسجيل الدخول</button>
      </form>

      <p class="account-question" id="accountQuestion">لا تملكين حسابًا؟</p>
      <a class="create-account" id="createAccount" href="#create-account">إنشاء حساب</a>
    </section>

    <button class="help-button" id="helpButton" type="button">
      <span>مساعدة</span>
      <span aria-hidden="true">•••</span>
    </button>
  </main>

  <script src="login.js"></script>
</body>
</html>
