<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="تسجيل الدخول إلى منصة مدار" />
  <title>تسجيل الدخول | مدار</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-page">
    <a class="back-home" href="index.html" aria-label="العودة إلى الصفحة الرئيسية">
      <span aria-hidden="true">→</span>
      العودة للرئيسية
    </a>

    <div class="symbol sigma sigma-one" aria-hidden="true">Σ</div>
    <div class="symbol sigma sigma-two" aria-hidden="true">Σ</div>
    <div class="symbol integral" aria-hidden="true">∫</div>

    <div class="solid solid-diamond solid-one" aria-hidden="true">
      <span></span><i></i><b></b>
    </div>
    <div class="solid solid-cube" aria-hidden="true">
      <span></span><i></i><b></b>
    </div>
    <div class="solid solid-diamond solid-two" aria-hidden="true">
      <span></span><i></i><b></b>
    </div>
    <div class="solid solid-orb" aria-hidden="true"><span>∫</span></div>

    <section class="login-card" aria-labelledby="roleTitle">
      <div class="card-shine" aria-hidden="true"></div>
      <h1 id="roleTitle">دخول الطالبة</h1>

      <form id="loginForm" novalidate>
        <label class="field">
          <span class="sr-only">اسم المستخدم</span>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder="اسم المستخدم"
            required
          />
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4.8 21a7.2 7.2 0 0 1 14.4 0"></path>
          </svg>
        </label>

        <label class="field password-field">
          <span class="sr-only">كلمة المرور</span>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="كلمة المرور"
            required
          />
          <svg class="key-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="8" cy="15" r="3.2"></circle>
            <path d="m10.5 12.6 7-7 2 2-1.5 1.5 1.3 1.3-2 2-1.3-1.3-3.3 3.3"></path>
          </svg>
          <button class="password-toggle" id="passwordToggle" type="button" aria-label="إظهار كلمة المرور">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.5 12s3.5-5 9.5-5 9.5 5 9.5 5-3.5 5-9.5 5-9.5-5-9.5-5Z"></path>
              <circle cx="12" cy="12" r="2.5"></circle>
            </svg>
          </button>
        </label>

        <p class="form-message" id="formMessage" aria-live="polite"></p>
        <button class="submit-button" type="submit">تسجيل الدخول</button>
      </form>

      <p class="account-question" id="accountQuestion">لا تملكين حسابًا؟</p>
      <a class="create-account" id="createAccount" href="#create-account">إنشاء حساب</a>
    </section>

    <button class="help-button" id="helpButton" type="button">
      <span>مساعدة</span>
      <span aria-hidden="true">•••</span>
    </button>
  </main>

  <script src="login.js"></script>
</body>
</html>
