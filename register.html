<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="إنشاء حساب جديد في منصة مدار" />
  <title>إنشاء حساب | مدار</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="register.css" />
</head>
<body>
  <main class="login-page register-page">
    <a class="back-home" id="backToLogin" href="login.html">
      <span aria-hidden="true">→</span>
      العودة لتسجيل الدخول
    </a>

    <svg class="geo-shape geo-cube" viewBox="0 0 210 230" aria-hidden="true">
      <g class="geo-lines">
        <path d="M42 58 120 23l58 45-76 42Z"/><path d="M42 58v104l62 43 74-42V68"/>
        <path d="M102 110v95M42 162l60-52 76 53"/>
      </g>
      <g class="geo-nodes">
        <circle cx="42" cy="58" r="5"/><circle cx="120" cy="23" r="4"/>
        <circle cx="178" cy="68" r="5"/><circle cx="102" cy="110" r="5"/>
        <circle cx="42" cy="162" r="4"/><circle cx="104" cy="205" r="5"/><circle cx="178" cy="163" r="5"/>
      </g>
    </svg>

    <svg class="geo-shape geo-globe" viewBox="0 0 220 220" aria-hidden="true">
      <g class="geo-lines">
        <circle cx="110" cy="110" r="88"/><ellipse cx="110" cy="110" rx="46" ry="88"/>
        <ellipse cx="110" cy="110" rx="76" ry="88"/><ellipse cx="110" cy="110" rx="88" ry="38"/>
        <ellipse cx="110" cy="110" rx="88" ry="68"/><path d="M22 110h176M110 22v176"/>
      </g>
      <g class="geo-nodes">
        <circle cx="110" cy="22" r="5"/><circle cx="22" cy="110" r="4"/>
        <circle cx="198" cy="110" r="5"/><circle cx="110" cy="198" r="5"/>
        <circle cx="45" cy="50" r="4"/><circle cx="176" cy="55" r="4"/>
      </g>
    </svg>

    <section class="login-card register-card" aria-labelledby="registerTitle">
      <div class="card-shine" aria-hidden="true"></div>
      <div id="registrationContent">
        <h1 id="registerTitle">إنشاء حساب الطالبة</h1>
        <p class="register-intro" id="registerIntro">أدخلي بياناتك لإرسال طلب الانضمام إلى منصة مدار.</p>

        <form class="register-form" id="registerForm" novalidate>
          <div id="dynamicFields"></div>

          <label class="field register-field password-field">
            <span class="field-label">كلمة المرور</span>
            <span class="input-wrap">
              <input
                id="registerPassword"
                name="password"
                type="password"
                autocomplete="new-password"
                placeholder="8 أحرف على الأقل"
                minlength="8"
                required
              />
              <button class="password-toggle" id="registerPasswordToggle" type="button" aria-label="إظهار كلمة المرور">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-5 9.5-5 9.5 5 9.5 5-3.5 5-9.5 5-9.5-5-9.5-5Z"></path>
                  <circle cx="12" cy="12" r="2.5"></circle>
                </svg>
              </button>
            </span>
          </label>

          <p class="form-message register-message" id="registerMessage" aria-live="polite"></p>
          <button class="submit-button register-submit" type="submit">إرسال طلب إنشاء الحساب</button>
        </form>
      </div>

      <div class="success-panel" id="successPanel" hidden>
        <span class="success-icon" aria-hidden="true">✓</span>
        <h1>تم إرسال طلبك</h1>
        <p>انتظري حتى تتم الموافقة على طلبك من إدارة منصة مدار.</p>
        <a class="submit-button success-link" id="successLoginLink" href="login.html">العودة لتسجيل الدخول</a>
      </div>
    </section>
  </main>

  <script src="register.js"></script>
</body>
</html>
